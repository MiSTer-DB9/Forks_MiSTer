name: Sync with upstream

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [sync_release]
  workflow_dispatch:

permissions:
  contents: write   # git push of merge commit
  actions: write    # POST workflow_dispatch to release.yml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # Workflows-capable token (PAT/App with Workflows:write) so the
        # sync_release.sh `git push origin <MAIN_BRANCH>` can carry an
        # upstream `.github/workflows/*` diff (many MiSTer-devel cores ship
        # their own build.yml). The default GITHUB_TOKEN is structurally
        # forbidden from updating workflow files. Same org secret as unstable.
        token: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}

    # merge_validate.sh's coresv_lint gate prefers verilator (Quartus-complete
    # SV grammar -> true syntax oracle on the post-merge <core>.sv; iverilog's
    # incomplete SV would only give a regression-delta). ~seconds to install,
    # ~1-2s to lint one core. merge_validate runs ONLY here in CI, so this is
    # the right place to provide the linter (vs the fail-open SKIP fallback).
    - name: Install verilator (coresv_lint gate)
      run: sudo apt-get update && sudo apt-get install -y verilator

    # Syntax-aware merge driver for HDL false-conflicts; configure_rerere wires it
    # in iff present, else the merge falls back to git's line merge (no-op).
    - name: Install mergiraf (syntax-aware HDL merge)
      uses: ./.github/actions/install-mergiraf

    - name: Sync with upstream
      run: ./.github/sync_release.sh <<MAINTAINER_EMAILS>>
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # POST workflow_dispatch to release.yml after the merge push — default
        # GITHUB_TOKEN pushes don't trigger downstream workflows (GH loop guard),
        # but the workflow_dispatch *API* authenticated with GITHUB_TOKEN does.
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
