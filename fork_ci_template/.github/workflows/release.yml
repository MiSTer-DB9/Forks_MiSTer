name: Release

# stable channel: build fork HEAD, publish to a per-commit
# immutable tag `stable/<MAIN_BRANCH>/<YYYYMMDD>-<sha7>` with one GitHub Release
# on top. Distribution picks the newest per variant via /releases?per_page=N
# filtered by tag prefix. Per-branch concurrency key so multi-variant repos
# build siblings in parallel.
concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - <<MAIN_BRANCH>>
  workflow_dispatch:
    inputs:
      forced:
        description: "Bypass source-hash skip + BOT-commit skip"
        required: false
        default: false
        type: boolean
      upstream_release_sha:
        description: "Upstream release commit SHA (from sync_release)"
        required: false
        default: ''
      upstream_head_at_sync:
        description: "Upstream HEAD at time of sync (from sync_release)"
        required: false
        default: ''

permissions:
  contents: write   # gh release create / upload / delete-asset

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Pre-flight skip check
      id: preflight
      run: ./.github/preflight_skip.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FORCED: ${{ github.event.inputs.forced }}

    # All FPGA forks build with native Quartus *Standard* in an ubuntu:24.04
    # container (no more docker Quartus Lite path). The Standard version is
    # `<<QUARTUS_NATIVE>>` — Forks.ini per-fork pin (e.g. 17.0std) or `auto`
    # (default) to derive it from the core's .qsf LAST_QUARTUS_VERSION.
    # `skip=true` for a non-Quartus section (COMPILATION_INPUT=make, e.g.
    # Main_DB9's separate release_v2 pipeline) so the templated workflow is an
    # inert no-op there instead of hard-failing on a missing .qsf.
    - name: Resolve Quartus Standard version
      if: steps.preflight.outputs.skip != 'true'
      id: mode
      run: |
        first_input=$(echo '<<COMPILATION_INPUT>>' | awk '{print $1}')
        if [ "${first_input}" = "make" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "Non-Quartus section (make) — skipping native Quartus build."
          exit 0
        fi
        echo "skip=false" >> "$GITHUB_OUTPUT"
        ver=$(QUARTUS_NATIVE_OVERRIDE='<<QUARTUS_NATIVE>>' ./.github/detect_quartus_version.sh "${first_input}")
        echo "version=${ver}" >> "$GITHUB_OUTPUT"
        echo "Native Quartus Standard build: ${ver}"

    - name: Quartus license
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.skip != 'true'
      run: ./.github/materialize_quartus_license.sh
      env:
        QUARTUS_LICENSE: ${{ secrets.QUARTUS_LICENSE }}
        QUARTUS_LICENSE_MAC: ${{ secrets.QUARTUS_LICENSE_MAC }}

    - name: Cache & install native Quartus
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.skip != 'true'
      uses: ./.github/actions/quartus-install-cache
      with:
        version: ${{ steps.mode.outputs.version }}
        device: c5
        install-repo: <<QUARTUS_INSTALL_REPO>>

    - name: Build stable RBF from fork HEAD
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.skip != 'true'
      run: ./.github/release.sh <<MAINTAINER_EMAILS>>
      env:
        NOTIFICATION_API_KEY: ${{ secrets.NOTIFICATION_API_KEY }}
        QUARTUS_NATIVE_VERSION: ${{ steps.mode.outputs.version }}
        QUARTUS_NATIVE_HOME: ${{ env.QUARTUS_NATIVE_HOME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FORCED: ${{ github.event.inputs.forced }}
        UPSTREAM_RELEASE_SHA: ${{ github.event.inputs.upstream_release_sha }}
        UPSTREAM_HEAD_AT_SYNC: ${{ github.event.inputs.upstream_head_at_sync }}
        # 64 hex chars = 32 bytes. KEEP SECRET.
        MASTER_ROOT_HEX: ${{ secrets.MASTER_ROOT_HEX }}

    - name: Upload Quartus reports
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.skip != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: quartus-reports
        path: |
          output_files/*.sta.summary
          output_files/*.sta.rpt
          output_files/*.fit.summary

        if-no-files-found: ignore
