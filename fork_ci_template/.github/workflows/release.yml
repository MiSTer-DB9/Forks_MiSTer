name: Release

# stable channel: build fork HEAD, publish to a per-commit immutable tag
# `stable/<MAIN_BRANCH>/<YYYYMMDD>-<sha>` with one GitHub Release on top.
# Distribution picks the newest per variant via /releases?per_page=N filtered
# by tag prefix. Per-branch concurrency key so multi-branch repos (GBA:
# master/GBA2P/accuracy) build siblings in parallel.
#
# Three jobs: preflight (skip gate + pin build SHA + emit the per-core matrix)
# → build (one matrix leg per core, each resolving Quartus Standard from ITS
# OWN .qsf and building in parallel) → publish (fan-in: bundle every staged RBF
# into the single release). Concurrency stays keyed on github.ref so two
# sections sharing a branch can't land in separate workflows and cancel each
# other (cancel-in-progress).
concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - <<MAIN_BRANCH>>
  workflow_dispatch:
    inputs:
      forced:
        description: "Bypass source-hash skip + BOT-commit skip"
        required: false
        default: false
        type: boolean
      upstream_release_sha:
        description: "Upstream release commit SHA (from sync_release)"
        required: false
        default: ''
      upstream_head_at_sync:
        description: "Upstream HEAD at time of sync (from sync_release)"
        required: false
        default: ''

permissions:
  contents: write   # gh release create / upload / delete-asset

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.preflight.outputs.skip }}
      source_hash: ${{ steps.preflight.outputs.source_hash }}
      skip_quartus: ${{ steps.meta.outputs.skip_quartus }}
      build_sha: ${{ steps.meta.outputs.build_sha }}
      date_stamp: ${{ steps.meta.outputs.date_stamp }}
      timestamp: ${{ steps.meta.outputs.timestamp }}
      matrix: ${{ steps.meta.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Pre-flight skip check
      id: preflight
      run: ./.github/preflight_skip.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FORCED: ${{ github.event.inputs.forced }}

    # Pin the build SHA (HEAD must not drift between parallel legs) and emit
    # the per-core build matrix from the templated lists. `skip_quartus=true`
    # for a non-Quartus section (COMPILATION_INPUT=make, e.g. Main_DB9's
    # separate release_v2 pipeline) so build/publish stay inert no-ops there.
    - name: Resolve build SHA + matrix
      if: steps.preflight.outputs.skip != 'true'
      id: meta
      run: |
        first_input=$(echo '<<COMPILATION_INPUT>>' | awk '{print $1}')
        if [ "${first_input}" = "make" ]; then
          echo "skip_quartus=true" >> "$GITHUB_OUTPUT"
          echo "Non-Quartus section (make) — skipping native Quartus build."
          exit 0
        fi
        echo "skip_quartus=false" >> "$GITHUB_OUTPUT"
        echo "build_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        echo "date_stamp=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
        echo "timestamp=$(date -u +%Y%m%d_%H%M)" >> "$GITHUB_OUTPUT"
        matrix=$(./.github/emit_matrix.sh '<<RELEASE_CORE_NAME>>' '<<COMPILATION_INPUT>>' '<<COMPILATION_OUTPUT>>')
        echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
        echo "Matrix: ${matrix}"

  build:
    needs: preflight
    if: ${{ needs.preflight.outputs.skip != 'true' && needs.preflight.outputs.skip_quartus != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.preflight.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ needs.preflight.outputs.build_sha }}
        fetch-depth: 1   # pinned SHA, tree only — no history walked here

    # Each leg derives its Quartus Standard from THIS core's .qsf
    # (matrix.input). `<<QUARTUS_NATIVE>>` = Forks.ini per-fork pin (e.g.
    # 17.0std) or `auto` (default → parse the .qsf LAST_QUARTUS_VERSION).
    - name: Resolve Quartus Standard version
      id: mode
      run: |
        ver=$(QUARTUS_NATIVE_OVERRIDE='<<QUARTUS_NATIVE>>' ./.github/detect_quartus_version.sh '${{ matrix.input }}')
        echo "version=${ver}" >> "$GITHUB_OUTPUT"
        echo "Native Quartus Standard build for ${{ matrix.core }}: ${ver}"

    - name: Quartus license
      run: ./.github/materialize_quartus_license.sh
      env:
        QUARTUS_LICENSE: ${{ secrets.QUARTUS_LICENSE }}
        QUARTUS_LICENSE_MAC: ${{ secrets.QUARTUS_LICENSE_MAC }}

    - name: Quartus image or install
      uses: ./.github/actions/quartus-image-or-install
      with:
        version: ${{ steps.mode.outputs.version }}
        device: c5
        install-repo: <<QUARTUS_INSTALL_REPO>>
        pull-token: ${{ secrets.GHCR_PULL_TOKEN }}

    - name: Build stable RBF leg
      run: ./.github/release_build.sh '${{ matrix.core }}' '${{ matrix.input }}' '${{ matrix.output }}' '${{ needs.preflight.outputs.date_stamp }}' '${{ needs.preflight.outputs.build_sha }}' -- <<MAINTAINER_EMAILS>>
      env:
        NOTIFICATION_API_KEY: ${{ secrets.NOTIFICATION_API_KEY }}
        QUARTUS_NATIVE_VERSION: ${{ steps.mode.outputs.version }}
        QUARTUS_NATIVE_IMAGE: ${{ env.QUARTUS_NATIVE_IMAGE }}
        QUARTUS_NATIVE_HOME: ${{ env.QUARTUS_NATIVE_HOME }}
        GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 64 hex chars = 32 bytes. KEEP SECRET.
        MASTER_ROOT_HEX: ${{ secrets.MASTER_ROOT_HEX }}

    - name: Upload RBF artifact
      uses: actions/upload-artifact@v4
      with:
        name: rbf-${{ matrix.core }}
        path: dist/
        if-no-files-found: error

    - name: Upload Quartus reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: quartus-reports-${{ matrix.core }}
        path: |
          output_files/*.sta.summary
          output_files/*.sta.rpt
          output_files/*.fit.summary

        if-no-files-found: ignore

  publish:
    needs: [preflight, build]
    # !cancelled() (not needs.build.result == 'success') so a partial set still
    # publishes — fail-fast:false keeps siblings building; a failed core just
    # has no artifact and is absent from the bundle.
    if: ${{ !cancelled() && needs.preflight.outputs.skip != 'true' && needs.preflight.outputs.skip_quartus != 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ needs.preflight.outputs.build_sha }}
        fetch-depth: 1   # only .github scripts needed here

    - name: Download built RBFs
      uses: actions/download-artifact@v4
      # zero artifacts (all legs failed) → empty dist/ → release_publish.sh
      # no-ops. Also tolerates a transient download error the same way; the
      # all-fail and flaky-download cases are intentionally indistinguishable
      # for this partial-publish channel.
      continue-on-error: true
      with:
        pattern: rbf-*
        path: dist
        merge-multiple: true

    - name: Publish stable release
      run: ./.github/release_publish.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BUILD_SHA: ${{ needs.preflight.outputs.build_sha }}
        SOURCE_HASH: ${{ needs.preflight.outputs.source_hash }}
        DATE_STAMP: ${{ needs.preflight.outputs.date_stamp }}
        TIMESTAMP: ${{ needs.preflight.outputs.timestamp }}
        UPSTREAM_RELEASE_SHA: ${{ github.event.inputs.upstream_release_sha }}
        UPSTREAM_HEAD_AT_SYNC: ${{ github.event.inputs.upstream_head_at_sync }}
