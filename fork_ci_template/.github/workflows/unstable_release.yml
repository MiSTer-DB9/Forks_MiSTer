name: Unstable Release

# unstable channel: build upstream HEAD on each tick, ship
# to "unstable-builds" prerelease assets (last 7 retained for rollback).
# Concurrency keyed per-branch so multi-variant repos (GBA: master/GBA2P/
# accuracy) build their variants in parallel without cancelling each other,
# while back-to-back triggers of the same variant still get serialized.
concurrency:
  group: unstable-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

permissions:
  contents: write   # gh release create / upload / delete-asset

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        # We checkout the fork's main branch only as a starting point for
        # remotes; unstable_preflight.sh fetches upstream + checks out the
        # unstable/<branch> ref before unstable_release.sh resumes the merge.
        fetch-depth: 0

    - name: Pre-flight skip check
      id: preflight
      run: ./.github/unstable_preflight.sh <<MAINTAINER_EMAILS>>
      env:
        NOTIFICATION_API_KEY: ${{ secrets.NOTIFICATION_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Native (Quartus Standard) vs docker (Quartus Lite) is a per-fork opt-in:
    # `<<QUARTUS_NATIVE>>` is empty for every fork except the pilot, so the
    # else-branch keeps the docker path byte-identical for all others.
    - name: Resolve build mode
      if: steps.preflight.outputs.skip != 'true'
      id: mode
      run: |
        native='<<QUARTUS_NATIVE>>'
        if [ -n "${native}" ]; then
          first_input=$(echo '<<COMPILATION_INPUT>>' | awk '{print $1}')
          ver=$(QUARTUS_NATIVE_OVERRIDE="${native}" ./.github/detect_quartus_version.sh "${first_input}")
          echo "native=true"    >> "$GITHUB_OUTPUT"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Native Quartus Standard build: ${ver}"
        else
          echo "native=false" >> "$GITHUB_OUTPUT"
          echo "Docker Quartus Lite build"
        fi

    - name: Resolve Quartus image
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.native != 'true'
      id: image
      run: |
        first_input=$(echo '<<COMPILATION_INPUT>>' | awk '{print $1}')
        image=$(./.github/detect_quartus_image.sh "${first_input}")
        echo "image=${image}" >> "$GITHUB_OUTPUT"
        echo "Resolved Quartus image: ${image}"
      env:
        QUARTUS_IMAGE_OVERRIDE: <<QUARTUS_IMAGE>>

    - name: Cache & load Quartus image
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.native != 'true'
      uses: ./.github/actions/docker-cache-load
      with:
        image: ${{ steps.image.outputs.image }}

    - name: Quartus license + MAC spoof
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.native == 'true'
      run: ./.github/materialize_quartus_license.sh
      env:
        QUARTUS_LICENSE: ${{ secrets.QUARTUS_LICENSE }}
        QUARTUS_LICENSE_MAC: ${{ secrets.QUARTUS_LICENSE_MAC }}

    - name: Cache & install native Quartus
      if: steps.preflight.outputs.skip != 'true' && steps.mode.outputs.native == 'true'
      uses: ./.github/actions/quartus-install-cache
      with:
        version: ${{ steps.mode.outputs.version }}
        device: c5
        install-repo: <<QUARTUS_INSTALL_REPO>>

    - name: Build unstable RBF from upstream HEAD
      if: steps.preflight.outputs.skip != 'true'
      run: ./.github/unstable_release.sh <<MAINTAINER_EMAILS>>
      env:
        NOTIFICATION_API_KEY: ${{ secrets.NOTIFICATION_API_KEY }}
        QUARTUS_IMAGE: ${{ steps.image.outputs.image }}
        QUARTUS_NATIVE_VERSION: ${{ steps.mode.outputs.native == 'true' && steps.mode.outputs.version || '' }}
        QUARTUS_NATIVE_HOME: ${{ env.QUARTUS_NATIVE_HOME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # key gate v1.5: MASTER_ROOT for SipHash MAC
        # unstable_release.sh materialises sys/db9_key_secret.vh from this env
        # var before Quartus compile (identical handling to sync_release.yml).
        # 64 hex chars = 32 bytes. KEEP THIS SECRET.
        MASTER_ROOT_HEX: ${{ secrets.MASTER_ROOT_HEX }}

    - name: Upload Quartus reports
      if: steps.preflight.outputs.skip != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: quartus-reports
        path: |
          output_files/*.sta.summary
          output_files/*.sta.rpt
          output_files/*.fit.summary

        if-no-files-found: ignore
