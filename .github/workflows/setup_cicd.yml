name: Setup CI/CD

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [setup_cicd]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup CI/CD on Forks
      run: ./.github/setup_cicd.sh
      env:
        DISPATCH_USER: x-access-token
        DISPATCH_TOKEN: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}
        PARALLEL_JOBS: 16
