name: Sync Forks

on:
  schedule:
    - cron:  '0 18 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [sync_forks]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Sync Forks
      run: ./.github/sync_forks.sh
      env:
        DISPATCH_USER: x-access-token
        DISPATCH_TOKEN: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}
        PARALLEL_JOBS: 16
