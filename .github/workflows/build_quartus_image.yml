name: Build Quartus Image

# Build the prebuilt Quartus Standard image(s) and push them to the PRIVATE
# package ghcr.io/mister-db9/quartus-native:<ver>. Every fork's release /
# unstable build then just `docker pull`s this instead of each repo
# re-running quartus-install.py + apt on every cache miss.
#
# Versions are data-driven: compute_quartus_versions.sh resolves the real set
# needed across all of Forks.ini (honouring QUARTUS_NATIVE pins, else each
# core's .qsf). workflow_dispatch can target a single version instead.
#
# NOTE (one-time, manual, org admin): after the first push, set the
# `quartus-native` package visibility to Private (Intel/Altera EULA forbids
# public redistribution), and create the org secret GHCR_PULL_TOKEN
# (read:packages) the fork builds use to pull it.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Single Quartus Standard key to build (e.g. 17.0std). Empty = all needed.'
        required: false
        default: ''
  push:
    paths:
      - '.github/quartus-native.Dockerfile'
      - '.github/compute_quartus_versions.sh'
      - '.github/lib/retry.sh'
      - 'fork_ci_template/.github/provision_quartus_native.sh'
      - 'fork_ci_template/.github/prune_quartus_tree.sh'
      - 'fork_ci_template/.github/detect_quartus_version.sh'
      - '.github/workflows/build_quartus_image.yml'
  schedule:
    # Monthly — refresh the ubuntu base + apt security updates even when the
    # Quartus set is unchanged.
    - cron: '0 4 1 * *'

env:
  IMAGE: ghcr.io/mister-db9/quartus-native

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.compute.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve version set
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IN="${{ github.event.inputs.version }}"
          if [ -n "${IN}" ]; then
            echo "Explicit dispatch version: ${IN}"
            echo "versions=[\"${IN}\"]" >> "$GITHUB_OUTPUT"
          else
            V="$(./.github/compute_quartus_versions.sh)"
            echo "Computed: ${V}"
            echo "versions=${V}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: set-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.set-matrix.outputs.versions) }}
    concurrency:
      group: build-quartus-image-${{ matrix.version }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push ${{ matrix.version }}
        run: |
          set -euo pipefail
          TAG="${IMAGE}:${{ matrix.version }}"
          docker build \
            -f .github/quartus-native.Dockerfile \
            --build-arg QUARTUS_VERSION="${{ matrix.version }}" \
            -t "${TAG}" .
          docker push "${TAG}"

      - name: Smoke-check the pushed image
        run: |
          set -euo pipefail
          TAG="${IMAGE}:${{ matrix.version }}"
          docker run --rm "${TAG}" bash -c '
            set -e
            "${QUARTUS_NATIVE_HOME}/quartus/bin/quartus_sh" --version >/dev/null
            test -x "${QUARTUS_NATIVE_HOME}/quartus/sopc_builder/bin/ip-generate"
            echo "OK: quartus_sh runs and ip-generate present in ${QUARTUS_NATIVE_HOME}"'

      - name: Reminder — keep package Private
        if: always()
        run: |
          echo "::notice::Ensure ghcr.io/mister-db9/quartus-native is set to PRIVATE"
          echo "::notice::and org secret GHCR_PULL_TOKEN (read:packages) exists for fork pulls."
