name: Sync jtcores

# jtcores can't ride setup_cicd.yml (which rm -rf's .github and stamps the
# DB9 template) — jotego owns that tree. This workflow mirrors the canonical
# sys/ helpers into jtcores at two destinations under
# modules/jtframe/target/mister/hdl/:
#   hdl/sys/   key-gate trio (siphash24.v, db9_key_gate.sv, db9_key_secret.vh)
#              keeps the FPGA SipHash byte-equal to Main_MiSTer/siphash24.c
#   hdl/       joydb wrapper + 3 helpers (joydb.sv with OSD-open autodetect
#              FSM, joydb9md.v, joydb9saturn.v, joydb15.v)
# joydb15.v now syncs too — canonical absorbed the JTFRAME_SDRAM96 ifdef
# (JCLOCKS[4] / /32 tick) so the 96 MHz CPS1.5/CPS2/SH7604 timing is
# preserved while non-jt cores stay on the original /16 path. See
# sync_jtcores.sh header.

on:
  push:
    branches: [master]
    paths:
      - fork_ci_template/sys/siphash24.v
      - fork_ci_template/sys/db9_key_gate.sv
      - fork_ci_template/sys/db9_key_secret.vh
      - fork_ci_template/sys/joydb.sv
      - fork_ci_template/sys/joydb9md.v
      - fork_ci_template/sys/joydb9saturn.v
      - fork_ci_template/sys/joydb15.v
      - .github/sync_jtcores.sh
      - .github/workflows/sync_jtcores.yml
  workflow_dispatch:
  repository_dispatch:
    types: [sync_jtcores]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Sync jtcores
      run: ./.github/sync_jtcores.sh
      env:
        DISPATCH_USER: x-access-token
        DISPATCH_TOKEN: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}
