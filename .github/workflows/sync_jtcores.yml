name: Sync jtcores

# jtcores can't ride setup_cicd.yml (which rm -rf's .github and stamps the
# DB9 template) — jotego owns that tree. This workflow mirrors the canonical
# sys/ helpers into jtcores at two destinations under
# modules/jtframe/target/mister/hdl/:
#   hdl/sys/   key-gate trio (siphash24.v, db9_key_gate.sv, db9_key_secret.vh)
#              keeps the FPGA SipHash byte-equal to Main_MiSTer/siphash24.c
#   hdl/       joydb wrapper + 2 helpers (joydb.sv with OSD-open autodetect
#              FSM, joydb9md.v, joydb9saturn.v)
# joydb15.v intentionally excluded — jt's copy carries an SDRAM96 ifdef
# canonical drops; see sync_jtcores.sh header.

on:
  push:
    branches: [master]
    paths:
      - fork_ci_template/sys/siphash24.v
      - fork_ci_template/sys/db9_key_gate.sv
      - fork_ci_template/sys/db9_key_secret.vh
      - fork_ci_template/sys/joydb.sv
      - fork_ci_template/sys/joydb9md.v
      - fork_ci_template/sys/joydb9saturn.v
      # joydb15.v intentionally excluded — see sync_jtcores.sh header
      - .github/sync_jtcores.sh
      - .github/workflows/sync_jtcores.yml
  workflow_dispatch:
  repository_dispatch:
    types: [sync_jtcores]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Sync jtcores
      run: ./.github/sync_jtcores.sh
      env:
        DISPATCH_USER: theypsilon
        DISPATCH_TOKEN: ${{ secrets.REPOSITORY_DISPATCH_THEYPSILON }}
