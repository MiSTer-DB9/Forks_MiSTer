# Zero-FP mirror of Hook-3: [Bbb_DB9] shares [Aaa_DB9]'s slug BUT sets
# DISTRIBUTION_FILTERS, so the stable hook `continue`s it before its
# collision guard -> the lint MUST NOT flag it either. (UNSTABLE_FORKS has
# no such skip, so Bbb_DB9 is NOT in UNSTABLE_FORKS here.)
[Forks]
SYNCING_FORKS = Aaa_DB9 Bbb_DB9
UNSTABLE_FORKS = Aaa_DB9

[Aaa_DB9]
FORK_REPO = https://github.com/MiSTer-DB9/Aaa_MiSTer.git
UPSTREAM_REPO = https://github.com/MiSTer-devel/Aaa_MiSTer.git
MAIN_BRANCH = master
RELEASE_CORE_NAME = Foo-Bar

[Bbb_DB9]
FORK_REPO = https://github.com/MiSTer-DB9/Bbb_MiSTer.git
UPSTREAM_REPO = https://github.com/MiSTer-devel/Bbb_MiSTer.git
MAIN_BRANCH = master
RELEASE_CORE_NAME = FooBar
DISTRIBUTION_FILTERS = dualsdram
